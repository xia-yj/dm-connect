name: Build desktop installers

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build x64 installer
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: DM-Connect-Windows-x64
          path: target/electron/*.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            artifact: DM-Connect-macOS-arm64
          - runner: macos-15-intel
            arch: x64
            artifact: DM-Connect-macOS-x64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build macOS ${{ matrix.arch }} packages
        shell: bash
        run: ./scripts/package-macos.sh ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/installer/*.dmg
            target/installer/*.app.zip
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: DM-Connect-Windows-x64
          path: dist/windows

      - uses: actions/download-artifact@v4
        with:
          name: DM-Connect-macOS-arm64
          path: dist/macos-arm64

      - uses: actions/download-artifact@v4
        with:
          name: DM-Connect-macOS-x64
          path: dist/macos-x64

      - name: Generate GitHub update manifest
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          RELEASE_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          cat > dist/update.json <<EOF
          {
            "version": "${VERSION}",
            "build": "${RELEASE_TAG}",
            "arm64Url": "${RELEASE_BASE}/DM-Connect-${VERSION}-arm64.app.zip",
            "x64Url": "${RELEASE_BASE}/DM-Connect-${VERSION}-x64.app.zip",
            "notes": "DM Connect ${RELEASE_TAG}"
          }
          EOF

      - name: Create GitHub Release and upload installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/windows/* \
            dist/macos-arm64/* \
            dist/macos-x64/* \
            dist/update.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "DM Connect $GITHUB_REF_NAME" \
            --generate-notes
