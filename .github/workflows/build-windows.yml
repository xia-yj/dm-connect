name: Build desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build x64 installer
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: DM-Connect-Windows-x64
          path: target/electron/*.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            artifact: DM-Connect-macOS-arm64
          - runner: macos-15-intel
            arch: x64
            artifact: DM-Connect-macOS-x64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build macOS ${{ matrix.arch }} packages
        shell: bash
        run: ./scripts/package-macos.sh ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/installer/*.dmg
            target/installer/*.app.zip
          if-no-files-found: error
          retention-days: 14
