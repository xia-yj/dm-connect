name: Build desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build x64 installer
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: DM-Connect-Windows-x64
          path: target/electron/*.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build macOS arm64 packages
        shell: bash
        run: ./scripts/package-macos.sh arm64

      - uses: actions/upload-artifact@v4
        with:
          name: DM-Connect-macOS-arm64
          path: |
            target/installer/*.dmg
            target/installer/*.app.zip
          if-no-files-found: error
          retention-days: 14
